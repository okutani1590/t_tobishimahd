		function sendmail(frmObj) {
			if (frmObj.elements['category'].value == 'Tobishima Holdings') {

			} else if (frmObj.elements['category'].value == 'Tobishima Corporation' || frmObj.elements['category'].value == 'Other') {

<body id="inner" class="contact confirm">
<section id="top" class="outline">
<header class="inc_english_header"><!-- /english/include/inc_header --></header>
<div class="main">
	<div class="wrap">
		<div class="breadlist">
			<div class="inner">
				<a href="/english/">TOP</a> &gt; <span>Contact Us</span>			
			</div>
		</div>
		<div class="visual">
			<div class="inner">
				<h1 class="label textstyle reverse scrollactive"><span>Contact Us</span></h1>
			</div>
		</div>
		<div class="content">
			<div class="formbox">
				<div class="inner">
					<p class="lead">May I transmit by the following contents?</p>
					<form method="post" action="/english/contact/">
						<dl class="formlist">
							<dt class="required"><span>Category</span></dt>
							<dd>
								<p class="confirmtext category"></p>
							</dd>
							<dt class="required"><span>Subject</span></dt>
							<dd>
								<p class="confirmtext subject"></p>
							</dd>
							<dt><span>Company</span></dt>
							<dd>
								<p class="confirmtext company"></p>
							</dd>
							<dt><span>Department</span></dt>
							<dd>
								<p class="confirmtext department"></p>
							</dd>
							<dt class="required"><span>Name</span></dt>
							<dd>
								<p class="confirmtext name"></p>
							</dd>
							<dt><span>Telephone</span></dt>
							<dd>
								<p class="confirmtext tel"></p>
							</dd>
							<dt class="required"><span>E-mail Address</span></dt>
							<dd>
								<p class="confirmtext email"></p>
							</dd>
							<dt class="required"><span>Comments</span></dt>
							<dd>
								<p class="confirmtext question"></p>
							</dd>
						</dl>
						<div class="submitbox">
							<label class="submit" for="form-submit" title="Submit">
								<input class="bgc2" id="form-submit" name="form-submit" type="submit" value="Submit" onclick="return sendmail(this.form);">
							</label>
							<label class="buck" for="form-back" title="Back">
								<input class="bgc5" id="form-back" name="form-reset" type="button" value="Back" onclick="return back(this.form);">
							</label>
						</div>
                        <input type="hidden" name="category" value="" />
                        <input type="hidden" name="subject" value="" />
                        <input type="hidden" name="name" value="" />
                        <input type="hidden" name="tel" value="" />
                        <input type="hidden" name="email" value="" />
                        <input type="hidden" name="email_confirm" value="" />
                        <input type="hidden" name="company" value="" />
                        <input type="hidden" name="department" value="" />
                        <input type="hidden" name="question" value="" />
                        <input type="hidden" name="agreement" value="" />
                        <input type="hidden" name="now" class="current_time" value="" />

					</form>
				
				</div>
			</div>
		</div>
	</div>
</div>
