<body id="inner" class="contact confirm">
<section id="top" class="outline">
<header class="inc_header"><!-- /include/inc_header --></header>
<div class="main">
	<div class="wrap">
		<div class="breadlist">
			<div class="inner">
				<a href="/">TOP</a> &gt; <span>お問い合わせ</span>			
			</div>
		</div>
		<div class="visual">
			<div class="inner">
				<p class="label textstyle reverse scrollactive"><span>Contact</span></p>
				<h1 class="scrollactive" data-delay="600">お問い合わせ</h1>
			</div>
		</div>
		<div class="content">
			<div class="formbox">
				<div class="inner">
					<p class="lead">以下の内容で送信してよろしいですか？</p>
					<form method="post" action="/contact/">
						<dl class="formlist">
							<dt class="required"><span>カテゴリー</span></dt>
							<dd>
								<p class="confirmtext category"></p>
							</dd>
							<dt class="required"><span>件名</span></dt>
							<dd>
								<p class="confirmtext subject"></p>
							</dd>
							<dt><span>会社・団体名等</span></dt>
							<dd>
								<p class="confirmtext company"></p>
							</dd>
							<dt><span>部署名等</span></dt>
							<dd>
								<p class="confirmtext department"></p>
							</dd>
							<dt class="required"><span>氏名</span></dt>
							<dd>
								<p class="confirmtext name"></p>
							</dd>
							<dt><span>電話番号</span></dt>
							<dd>
								<p class="confirmtext tel"></p>
							</dd>
							<dt class="required"><span>メールアドレス</span></dt>
							<dd>
								<p class="confirmtext email"></p>
							</dd>
							<dt class="required"><span>お問合せ内容</span></dt>
							<dd>
								<p class="confirmtext question"></p>
							</dd>
						</dl>
						<div class="submitbox">
							<label class="submit" for="form-submit" title="送信">
								<input class="bgc2" id="form-submit" name="form-submit" type="submit" value="送信" onclick="return sendmail(this.form);">
							</label>
							<label class="buck" for="form-back" title="戻る">
								<input class="bgc5" id="form-back" name="form-reset" type="button" value="戻る" onclick="return back(this.form);">
							</label>
						</div>
                        <input type="hidden" name="category" value="" />
                        <input type="hidden" name="subject" value="" />
                        <input type="hidden" name="name" value="" />
                        <input type="hidden" name="tel" value="" />
                        <input type="hidden" name="email" value="" />
                        <input type="hidden" name="email_confirm" value="" />
                        <input type="hidden" name="company" value="" />
                        <input type="hidden" name="department" value="" />
                        <input type="hidden" name="question" value="" />
                        <input type="hidden" name="agreement" value="" />
                        <input type="hidden" name="now" class="current_time" value="" />

					</form>
				
				</div>
			</div>
		</div>
	</div>
</div>
<div class="group-company inc_group-company" id="group-company"><!-- /include/inc_group-company --></div>
