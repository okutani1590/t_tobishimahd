        <div class="main rt_bn_news_info">
            <div class="wrap">
                <div class="breadlist">
                    <div class="inner">
                        <a href="/">TOP</a> &gt; <a href="/news/">NEWS</a> &gt; <span
                            class="rt_cf_n_title">$記事タイトル$</span>
                    </div>
                </div>
                <div class="content">
                    <section class="sec news">
                        <div class="inner">
                            <div class="info">
                                <h1 class="textstyle reverse scrollactive"><span>News</span></h1>
                            </div>
                            <div class="articlewrap">
                                <article class="scrollactive fadein">
                                    <div class="meta">
                                        <p class="date rt_cf_n_date">$日付$</p>
                                        <p class="category"><span class="rt_category_tag">$category$</span></p>
                                    </div>
                                    <h1 class="rt_cf_n_title">$記事タイトル$</h1>
                                    <div class="">
                                        <div class="bcloWrap">
                                            <!-- index表示 -->
                                            <!-- <span class="rt_bn_news_info">
                                                <span class="di_none rt_cf_n_index"></span>
                                            </span> -->

                                                <!-- インデックス表示部分 -->
                                                <!-- <div class="bclo-idx-item-list"></div> -->

										<style>

											<div class="bclo-idx-item-title">目次</div>

												<a class="bclo-idx-item bclo-idx-item-lg-anchor" href="#bclo-idx-item-idx-0" rel="scroll">$見出し$</a>
											</div>
											<div class="bclo-idx-item bclo-idx-item-sm">
												<a class="bclo-idx-item bclo-idx-item-sm-anchor" href="#bclo-idx-item-idx-1" rel="scroll">$見出し小$</a>
											</div>
											<div class="bclo-idx-item bclo-idx-item-lg">
												<a class="bclo-idx-item bclo-idx-item-lg-anchor" href="#bclo-idx-item-idx-2" rel="scroll">$見出し$</a>
											</div>
											<div class="bclo-idx-item bclo-idx-item-sm">
												<a class="bclo-idx-item bclo-idx-item-sm-anchor" href="#bclo-idx-item-idx-3" rel="scroll">$見出し小$</a>
											</div>
										</div>  -->
                                                <section class="inc_detail_block rt_cf_n_block_link_type_is_0">

                                                    </div>

                                            </div>
                                        </div>

                                <div class="bt_index scrollactive">

    <script src="/addcommon/js/slick.min.js"></script>
    <script src="/addcommon/js/remodal.js"></script>
    <script src="/addcommon/js/common.js?v=14"></script>
    <script src="/addcommon/js/news.js?v=1"></script>
    <script type="text/javascript" src="/blockLayout/addCommon/js/blockLayout.js"></script>

    <script>
        // 各オプションはすべてデフォルト値
        CLG.run({
            titleLgSelector: 'h2.bclo-title-lg',
            titleSmSelector: 'h3.bclo-title-sm',
            indexSelector: '.bclo-idx-item-list',
            hasTitle: true,
            title: 'Index',
        });
        if (document.querySelector('.rt_cf_n_index').textContent !== '1') {
            document.querySelectorAll('.bclo-idx-item-list').forEach(function (item) {
                item.style.display = 'none';
            });
        }
    </script>
